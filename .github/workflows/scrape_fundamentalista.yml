# .github/workflows/scrape_fundamentalista.yml
name: Scrape Status Invest - Fase 2

on:
  schedule:
    - cron: '0 6 * * 1-5'  # Seg-Sex 6h da manhã (após fechamento do mercado BR)
  workflow_dispatch:  # Permite rodar manualmente

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install playwright playwright-stealth pandas beautifulsoup4 fake-useragent tenacity
        playwright install chromium
    
    - name: Run scraper
      env:
        # Se usar proxy pago
        PROXY_URL: ${{ secrets.PROXY_URL }}
      run: |
        python -c "
        import asyncio
        from status_invest_scraper import processar_ticker
        
        tickers = ['PETR4', 'VALE3', 'WEGE3', 'ITUB4', 'BBAS3', 'RAIZ4', 'VBBR3']
        
        for ticker in tickers:
            try:
                processar_ticker(ticker)
            except Exception as e:
                print(f'Falha em {ticker}: {e}')
            asyncio.sleep(5)  # Rate limiting entre tickers
        "
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dados-fundamentalistas
        path: data/notebooklm/*.md
    
    - name: Commit to repo (opcional - histórico versionado)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        git commit -m "Update fundamental data: $(date +%Y-%m-%d)" || exit 0
        git push
