# .github/workflows/scrape_fundamentalista.yml
name: Scrape Fundamentus

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy requests beautifulsoup4 tenacity lxml html5lib tabulate

      - name: Run scraper
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          python -c "
          import time
          from normalizer import processar_ticker

          tickers = ['PETR4', 'VALE3', 'WEGE3', 'ITUB4', 'BBAS3', 'RAIZ4', 'VBBR3']

          for ticker in tickers:
              try:
                  processar_ticker(ticker)
              except Exception as e:
                  print(f'Falha em {ticker}: {e}')
              time.sleep(3)
          "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dados-fundamentalistas
          path: data/notebooklm/*.md

      - name: Commit to repo (opcional - histórico versionado)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git commit -m "Update fundamental data: $(date +%Y-%m-%d)" || exit 0
          git push
