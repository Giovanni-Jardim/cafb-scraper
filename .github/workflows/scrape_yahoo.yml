name: Scrape Yahoo Finance

on:
  schedule:
    - cron: '0 6 * * 1-5'  # Seg-Sex 6h da manhã
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy yfinance tenacity tabulate lxml

      - name: Run scraper
        run: |
          python -c "
          import time
          import random
          from normalizer_yahoo import processar_ticker

          # Tickers brasileiros (Yahoo usa .SA)
          tickers = ['ABCB4','ABEV3','AGRO3', 'ALOS3', 'ALPA4', 'ANIM3', 'ASAI3', 'AZZA3', 'B3SA3', 'BBAS3', 'BBDC3', 'BBDC4', 'BBSE3', 'BEEF3', 'BPAC11', 'BRAP4', 'BRAV3', 'BRKM5', 'BRSR6', 'CAML3', 'CASH3', 'CBAV3', 'CEAB3', 'CMIG4', 'CMIN3', 'COGN3', 'CPFE3', 'CPLE3', 'CSAN3', 'CSMG3', 'CSNA3', 'CURY3', 'CVCB3', 'CYRE3', 'DIRR3', 'DXCO3', 'ECOR3', 'EMBR3', 'ENEV3', 'ENGI11', 'EQTL3', 'EZTC3', 'FLRY3', 'GGBR4', 'GGPS3', 'GMAT3', 'GOAU4', 'GRND3', 'HAPV3', 'HYPE3', 'ITSA4', 'ITUB3', 'ITUB4', 'JHSF3', 'KEPL3', 'KLBN11', 'LJQQ3', 'LREN3', 'LWSA3', 'MDIA3', 'MGLU3', 'MOTV3', 'MOVI3', 'MRFG3', 'MRVE3', 'NEOE3', 'NTCO3', 'ONCO3', 'PCAR3', 'PETR3', 'PETR4', 'PGMN3', 'PLPL3', 'POMO4', 'POSI3', 'PRIO3', 'PSSA3', 'QUAL3', 'RADL3', 'RAIL3', 'RAIZ4', 'RAPT4', 'RDOR3', 'RECV3', 'RENT3', 'SANB11', 'SAPR11', 'SBSP3', 'SEER3', 'SIMH3', 'SLCE3', 'SMFT3', 'SMTO3', 'SUZB3', 'TAEE11', 'TIMS3', 'TOTS3', 'UGPA3', 'USIM5', 'VALE3', 'VAMO3', 'VBBR3', 'VIVA3', 'VIVT3', 'WEGE3', 'YDUQ3']
          
          for ticker in tickers:
              try:
                  processar_ticker(ticker)
                  # Delay entre requisições (educado)
                  time.sleep(random.uniform(2, 5))
              except Exception as e:
                  print(f'Falha em {ticker}: {e}')
          "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dados-fundamentalistas
          path: data/notebooklm/*.md

      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git commit -m "Update Yahoo Finance data: $(date +%Y-%m-%d) | Inclui histórico de dividendos" || exit 0
          git push
