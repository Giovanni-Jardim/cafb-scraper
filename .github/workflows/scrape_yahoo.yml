name: Scrape Yahoo Finance

on:
  schedule:
    - cron: '0 6 * * 1-5'  # Seg-Sex 6h da manhã
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy yfinance tenacity tabulate lxml

      - name: Run scraper
        run: |
          python -c "
          import time
          import random
          from normalizer_yahoo import processar_ticker

          # Tickers brasileiros (Yahoo usa .SA)
          tickers = ['PETR4', 'VALE3', 'ITUB4', 'BBDC4', 'ABEV3']
          
          for ticker in tickers:
              try:
                  processar_ticker(ticker)
                  # Delay entre requisições (educado)
                  time.sleep(random.uniform(2, 5))
              except Exception as e:
                  print(f'Falha em {ticker}: {e}')
          "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dados-fundamentalistas
          path: data/notebooklm/*.md

      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git commit -m "Update Yahoo Finance data: $(date +%Y-%m-%d)" || exit 0
          git push